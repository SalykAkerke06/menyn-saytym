<!DOCTYPE html>
<html>
<head>
    <title>ҚазҰҚПУ студент жүйесі</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        h2 { color: #2d3436; margin-bottom: 30px; }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; text-decoration: none; color: white; }
        .btn-login { background: #0984e3; }
        .btn-reg { background: #00b894; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎓 ҚазҰҚПУ студенттер жүйесі</h2>
        <a href="/login" class="btn btn-login">Кіру</a>
        <a href="/register" class="btn btn-reg">Тіркелу</a>
    </div>
</body>
</html>
