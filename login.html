<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Кіру - ҚазҰҚПУ</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }
        h2 { color: #2f3640; margin-bottom: 25px; }
        .flash-msg {
            padding: 12px;
            background-color: #d1edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .flash-error {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .btn-login {
            background-color: #0984e3;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn-login:hover { background-color: #0873c4; }
        .back-link {
            margin-top: 15px;
            display: block;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash-msg {% if category == 'danger' %}flash-error{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="login-card">
        <h2>Кіру</h2>
        <form method="POST">
            <input type="text" name="id" placeholder="ID" required>
            <input type="password" name="password" placeholder="Құпиясөз" required>
            <button type="submit" class="btn-login">Кіру</button>
        </form>
        <a href="/" class="back-link">Артқа қайту</a>
    </div>

</body>
</html>
